<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | AnyWebWall</title>
    
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="https://github.com/AryanMewada/Resources/raw/main/AnyWebWall.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Premium Dark Theme */
        :root {
            --bg-color: #0f1115;
            --surface: #181b21;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 20px;
        }

        .error-msg {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .error-desc {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 40px;
            max-width: 500px;
        }

        .btn-home {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }

        .btn-home:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>
<body>

    <div class="error-code">404</div>
    <div class="error-msg">Lost in the Matrix?</div>
    <div class="error-desc">The page or wallpaper you are looking for doesn't exist, has been moved, or is temporarily unavailable.</div>
    
    <a href="/" class="btn-home">Return to Home</a>

</body>
</html>
